name: Autonomous AI Agent

on:
  schedule:
    # Runs at 08:00 UTC every Monday and Thursday (adjust as needed)
    - cron: '0 8 * * 1,4'
  workflow_dispatch: # Adds a button so you can manually click "Run" in GitHub

permissions:
  contents: write # Allows GitHub to commit the database back to the repo

concurrency:
  group: autonomous-agent-main
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up installation

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Agent Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASS: ${{ secrets.SMTP_APP_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Runs the main script. If it fails, the workflow stops here.
          python main.py

      - name: Save Persistent Database Memory (Git Auto-Commit)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # Add history.db only if it exists (first run may not create it).
          if [ -f data/history.db ]; then
            git add -f data/history.db
          fi
          # Commit/push only when tracked content changed.
          if ! git diff --cached --quiet; then
            git commit -m "chore: update agent history.db [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          else
            echo "No database changes to commit"
          fi
